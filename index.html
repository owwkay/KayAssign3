<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kay's Gallery</title>
    <link rel="stylesheet" href="reset.css" />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
</head>
<body>
    <div class="gallery">
        <div class="polaroid">
            <div class="polaroid-inner"> 
                <div class="pola-front">
                    <img class="front" src="flowFRONT.jpg" alt="Flowers for Mum">
                </div>
                <div class="pola-back">
                    <img class="back" src="flowBACK.jpg" alt="Flowers for Mum">
                </div>
            </div>
        </div>

        <div class="polaroid">
            <div class="polaroid-inner"> 
                <div class="pola-front">
                    <img class="front" src="shopFRONT.jpg" alt="Exploring a new shop">
                </div>
                <div class="pola-back">
                    <img class="back" src="shopBACK.jpg" alt="Exploring a new shop">
                </div>
            </div>
        </div>

        <div class="polaroid">
            <div class="polaroid-inner"> 
                <div class="pola-front">
                    <img class="front" src="bdayFRONT.jpg" alt="Friend's birthday">
                </div>
                <div class="pola-back">
                    <img class="back" src="bdayBACK.jpg" alt="Friend's birthday">
                </div>
            </div>
        </div>

        <div class="polaroid">
            <div class="polaroid-inner"> 
                <div class="pola-front">
                    <img class="front" src="moodFRONT.jpg" alt="Mood 24/7">
                </div>
                <div class="pola-back">
                    <img class="back" src="moodBACK.jpg" alt="Mood 24/7">
                </div>
            </div>
        </div>

        <div class="polaroid">
            <div class="polaroid-inner"> 
                <div class="pola-front">
                    <img class="front" src="kFRONT.jpg" alt="KBBQ With Friends">
                </div>
                <div class="pola-back">
                    <img class="back" src="kBACK.jpg" alt="KBBQ With Friends">
                </div>
            </div>
        </div>

        <div class="polaroid">
            <div class="polaroid-inner"> 
                <div class="pola-front">
                    <img class="front" src="brFRONT.jpg" alt="Backrooms">
                </div>
                <div class="pola-back">
                    <img class="back" src="brBACK.jpg" alt="Backrooms">
                </div>
            </div>
        </div>
    </div>

</body>
</html>
