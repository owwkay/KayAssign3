<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kay's Gallery</title>
    <link rel="stylesheet" href="reset.css" />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
</head>
<body>
    <div class="gallery"> <!-- I needed to put all of my images in a "gallery" container so that I would be able to format them into the grid layout within my CSS file -->
        <div class="polaroid"> <!-- Each polaroid container holds the front and back of the image as they are two separate things, being the image and the caption written on tape-->
            <div class="polaroid-inner"> <!-- "polaroid-inner" basically acts as the inside piece of the polaroid holding the front and the back (I used ChatGPT to help me understand a few parts of my code when the video tutorial I used didn't go into depth)-->
                <div class="pola-front"> <!-- https://www.w3schools.com/howto/howto_css_flip_card.asp used this page to help me understand the divs and what theyre used for-->
                    <img class="front" src="flowFRONT.jpg" alt="Flowers for Mum"> <!-- front of the picture-->
                </div>
                <div class="pola-back">
                    <img class="back" src="flowBACK.jpg" alt="Flowers for Mum"> <!-- back of the picture-->
                </div>
            </div>
        </div>

        <div class="polaroid">
            <div class="polaroid-inner"> 
                <div class="pola-front">
                    <img class="front" src="shopFRONT.jpg" alt="Exploring a new shop">
                </div>
                <div class="pola-back">
                    <img class="back" src="shopBACK.jpg" alt="Exploring a new shop">
                </div>
            </div>
        </div>

        <div class="polaroid">
            <div class="polaroid-inner"> 
                <div class="pola-front">
                    <img class="front" src="bdayFRONT.jpg" alt="Friend's birthday">
                </div>
                <div class="pola-back">
                    <img class="back" src="bdayBACK.jpg" alt="Friend's birthday">
                </div>
            </div>
        </div>

        <div class="polaroid">
            <div class="polaroid-inner"> 
                <div class="pola-front">
                    <img class="front" src="moodFRONT.jpg" alt="Mood 24/7">
                </div>
                <div class="pola-back">
                    <img class="back" src="moodBACK.jpg" alt="Mood 24/7">
                </div>
            </div>
        </div>

        <div class="polaroid">
            <div class="polaroid-inner"> 
                <div class="pola-front">
                    <img class="front" src="kFRONT.jpg" alt="KBBQ With Friends">
                </div>
                <div class="pola-back">
                    <img class="back" src="kBACK.jpg" alt="KBBQ With Friends">
                </div>
            </div>
        </div>

        <div class="polaroid">
            <div class="polaroid-inner"> 
                <div class="pola-front">
                    <img class="front" src="brFRONT.jpg" alt="Backrooms">
                </div>
                <div class="pola-back">
                    <img class="back" src="brBACK.jpg" alt="Backrooms">
                </div>
            </div>
        </div>
    </div>

</body>
</html>
